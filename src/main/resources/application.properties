spring.application.name=schedula

# 5432 Driver class name (often not strictly needed if the URL is correct, but good practice)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/SchedulaDB
spring.datasource.username=postgres
spring.datasource.password=781135350
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# إظهار استعلامات SQL للتأكد من العمل (اختياري للتجربة)
spring.jpa.show-sql=true